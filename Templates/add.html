
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log session — StudyPulse</title>
  <style>
    body { font-family: Georgia, serif; max-width: 480px; margin: 40px auto; padding: 0 20px; background: #fafaf8; color: #1a1a1a; }
    h1 { font-size: 1.6rem; margin-bottom: 24px; }
    label { display: block; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 4px; margin-top: 16px; }
    input, select { width: 100%; padding: 10px; font-size: 1rem; border: 1px solid #ddd; border-radius: 4px; background: #fff; box-sizing: border-box; }
    .error { background: #fff3f0; border: 1px solid #f5c0b0; color: #c0392b; padding: 10px 14px; border-radius: 4px; margin-bottom: 16px; font-size: 0.9rem; }
    button { margin-top: 24px; padding: 10px 24px; background: #1a1a1a; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    a { display: inline-block; margin-top: 16px; color: #888; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Log a session</h1>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/add">
    <label for="subject">Subject</label>
    <input type="text" id="subject" name="subject" placeholder="e.g. Math" required>

    <label for="duration_minutes">Duration (minutes)</label>
    <input type="number" id="duration_minutes" name="duration_minutes" min="1" placeholder="e.g. 45" required>

    <label for="mood">Mood</label>
    <select id="mood" name="mood">
      <option value="focused">Focused</option>
      <option value="distracted">Distracted</option>
      <option value="tired">Tired</option>
    </select>

    <button type="submit">Save session</button>
  </form>

  <a href="/">Back to dashboard</a>
</body>
